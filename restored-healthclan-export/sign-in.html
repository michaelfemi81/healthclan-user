<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>HealthClan Login</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    :root {
      --bg: #e9f6fe;
      --teal: #085161;
      --cyan: #11a2c1;
      --ink: #15232b;
      --muted: #657985;
      --white: #ffffff;
      --field: rgba(19, 202, 214, 0.16);
      --line: rgba(8, 81, 97, 0.14);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Poppins, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .screen {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      animation: enter 180ms ease both;
    }

    .top {
      height: 82px;
      padding: max(16px, env(safe-area-inset-top)) 22px 0;
      background: linear-gradient(180deg, var(--teal) 0%, var(--cyan) 100%);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .top-inner {
      width: min(100%, 430px);
      display: grid;
      grid-template-columns: 48px 1fr 48px;
      align-items: center;
    }

    .back {
      color: var(--white);
      text-decoration: none;
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
    }

    .top-title {
      margin: 0;
      text-align: center;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .content {
      width: min(100%, 430px);
      margin: 0 auto;
      padding: 34px 22px 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    h1 {
      margin: 0;
      color: var(--teal);
      font-size: 30px;
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: 0;
    }

    .sub {
      margin: 10px 0 22px;
      color: var(--ink);
      font-size: 15px;
      line-height: 1.5;
      font-weight: 650;
    }

    .field {
      width: 100%;
      height: 48px;
      border: 1px solid rgba(255, 255, 255, 0.68);
      border-radius: 10px;
      background: var(--field);
      color: var(--ink);
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      padding: 0 14px;
      margin-bottom: 12px;
      outline: none;
    }

    .field::placeholder {
      color: var(--cyan);
    }

    .recover {
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      margin: 0 0 16px;
    }

    .recover a {
      color: var(--teal);
      font-weight: 900;
      text-decoration: none;
    }

    .primary {
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: 10px;
      background: linear-gradient(180deg, var(--teal) 0%, var(--cyan) 100%);
      color: var(--white);
      font-size: 21px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 14px 24px rgba(8, 81, 97, 0.18);
    }

    .bottom {
      margin-top: 18px;
      text-align: center;
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
    }

    .bottom a {
      color: var(--teal);
      font-weight: 900;
      text-decoration: none;
    }

    @media (min-width: 900px) and (min-height: 680px) {
      body {
        align-items: center;
        padding: 24px;
        background: linear-gradient(180deg, #dff2fa 0%, #f2fbff 100%);
      }

      .screen {
        width: min(920px, calc(100vw - 48px));
        min-height: 0;
        height: min(620px, calc(100dvh - 48px));
        border-radius: 30px;
        overflow: hidden;
        box-shadow: 0 24px 70px rgba(8, 81, 97, 0.22);
      }

      .top {
        height: 92px;
      }

      .top-inner {
        width: min(100%, 620px);
      }

      .content {
        width: min(100%, 430px);
        padding-top: 58px;
        justify-content: flex-start;
      }
    }

    @keyframes enter {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="screen">
    <header class="top">
      <div class="top-inner">
        <a class="back" href="/" aria-label="Back to home">‹</a>
        <h1 class="top-title">Login</h1>
        <span></span>
      </div>
    </header>
    <section class="content">
      <h1>Welcome Back</h1>
      <p class="sub">Lets get you back on track with your health goals. Please sign in to continue.</p>
      <input class="field" type="email" placeholder="Email" autocomplete="email" />
      <input class="field" type="password" placeholder="Password" autocomplete="current-password" />
      <p class="recover">Forgot Password? <a href="/forgot">Recover</a></p>
      <a class="primary" href="/">Login</a>
      <p class="bottom">Haven’t registered yet? <a href="/create-account">Signup</a></p>
    </section>
  </main>
</body>
</html>
